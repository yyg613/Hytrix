name: anime_st
description: "AnimeST - 跨平台动漫追番应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 网络请求
  dio: ^5.7.0

  # 本地存储
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28

  # 路由
  go_router: ^14.8.1

  # 视频播放
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # 工具
  path_provider: ^2.1.5
  path: ^1.9.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  intl: ^0.19.0
  collection: ^1.19.1
  html: ^0.15.4

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # 代码生成
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.2
  drift_dev: ^2.22.1
  json_serializable: ^6.9.4
  freezed: ^2.5.8

  # 测试
  mockito: ^5.4.5

flutter:
  uses-material-design: true
